---
- name: Normalize Proxmox feature flags for module input
  ansible.builtin.set_fact:
    ct_instance_features_effective: >-
      {{
        (
          ct_instance_features
          | dict2items
          | map(attribute='key')
          | zip(
              ct_instance_features
              | dict2items
              | map(attribute='value')
              | map('string')
            )
          | map('join', '=')
          | list
        )
        if (ct_instance_features is mapping)
        else (ct_instance_features | default([]))
      }}

- name: Normalize Proxmox API token ID for module input
  ansible.builtin.set_fact:
    ct_instance_api_token_id_effective: >-
      {{
        (ct_instance_api_token_id | regex_replace('^' ~ (ct_instance_api_user | regex_escape) ~ '!', ''))
        if (ct_instance_api_token_id is string)
        else ct_instance_api_token_id
      }}

- name: Manage CT lifecycle with fallback for existing VMID
  block:
    - name: Manage CT lifecycle (create or update)
      community.general.proxmox:
        api_host: "{{ ct_instance_api_host }}"
        api_user: "{{ ct_instance_api_user }}"
        api_token_id: "{{ ct_instance_api_token_id_effective }}"
        api_token_secret: "{{ ct_instance_api_token_secret }}"
        validate_certs: "{{ ct_instance_validate_certs }}"
        node: "{{ ct_instance_node }}"
        vmid: "{{ ct_instance_vmid }}"
        hostname: "{{ ct_instance_hostname }}"
        ostemplate: "{{ ct_instance_ostemplate }}"
        password: "{{ (ct_instance_password | default('')) if ((ct_instance_password | default('') | length) > 0) else omit }}"
        pubkey: "{{ (ct_instance_pubkey | default('')) if ((ct_instance_pubkey | default('') | length) > 0) else omit }}"
        storage: "{{ ct_instance_storage }}"
        cores: "{{ ct_instance_cores }}"
        memory: "{{ ct_instance_memory }}"
        swap: "{{ ct_instance_swap }}"
        disk: "{{ ct_instance_storage }}:{{ ct_instance_rootfs_size }}"
        netif: "{{ ct_instance_netif }}"
        features: >-
          {{
            ct_instance_features_effective
            if ((ct_instance_unprivileged | bool) or (ct_instance_api_user == 'root@pam'))
            else omit
          }}
        mounts: "{{ ct_instance_mounts }}"
        unprivileged: "{{ ct_instance_unprivileged }}"
        onboot: "{{ ct_instance_onboot }}"
        timeout: "{{ ct_instance_timeout }}"
        state: "{{ ct_instance_state }}"
      delegate_to: localhost
      register: ct_instance_manage_result

  rescue:
    - name: Retry CT lifecycle without create-only fields when CT already exists
      when:
        - ct_instance_state != 'absent'
        - ct_instance_manage_result is defined
        - "'already exists' in ((ct_instance_manage_result.msg | default('')) | lower)"
      community.general.proxmox:
        api_host: "{{ ct_instance_api_host }}"
        api_user: "{{ ct_instance_api_user }}"
        api_token_id: "{{ ct_instance_api_token_id_effective }}"
        api_token_secret: "{{ ct_instance_api_token_secret }}"
        validate_certs: "{{ ct_instance_validate_certs }}"
        node: "{{ ct_instance_node }}"
        vmid: "{{ ct_instance_vmid }}"
        hostname: "{{ ct_instance_hostname }}"
        storage: "{{ ct_instance_storage }}"
        cores: "{{ ct_instance_cores }}"
        memory: "{{ ct_instance_memory }}"
        swap: "{{ ct_instance_swap }}"
        disk: "{{ ct_instance_storage }}:{{ ct_instance_rootfs_size }}"
        netif: "{{ ct_instance_netif }}"
        features: >-
          {{
            ct_instance_features_effective
            if ((ct_instance_unprivileged | bool) or (ct_instance_api_user == 'root@pam'))
            else omit
          }}
        mounts: "{{ ct_instance_mounts }}"
        unprivileged: "{{ ct_instance_unprivileged }}"
        onboot: "{{ ct_instance_onboot }}"
        timeout: "{{ ct_instance_timeout }}"
        state: "{{ ct_instance_state }}"
      delegate_to: localhost

    - name: Fail when CT lifecycle fallback is not applicable
      when:
        - ct_instance_manage_result is not defined
          or 'already exists' not in ((ct_instance_manage_result.msg | default('')) | lower)
          or ct_instance_state == 'absent'
      ansible.builtin.fail:
        msg: "{{ ct_instance_manage_result.msg | default('CT lifecycle failed') }}"


- name: Configure NVIDIA device passthrough in LXC config
  become: true
  ansible.builtin.blockinfile:
    path: "/etc/pve/lxc/{{ ct_instance_vmid }}.conf"
    marker: "# {mark} ANSIBLE MANAGED NVIDIA PASSTHROUGH"
    block: "{{ ct_instance_nvidia_passthrough_block }}"
    insertafter: EOF
  when:
    - ct_instance_enable_nvidia_passthrough | bool
    - ct_instance_state != 'absent'
  register: ct_instance_nvidia_passthrough_result

- name: Stop CT to apply NVIDIA passthrough config changes
  when:
    - ct_instance_enable_nvidia_passthrough | bool
    - ct_instance_restart_on_nvidia_passthrough_change | bool
    - ct_instance_nvidia_passthrough_result is defined
    - ct_instance_nvidia_passthrough_result is changed
    - ct_instance_state != 'absent'
  delegate_to: localhost
  community.general.proxmox:
    api_host: "{{ ct_instance_api_host }}"
    api_user: "{{ ct_instance_api_user }}"
    api_token_id: "{{ ct_instance_api_token_id_effective }}"
    api_token_secret: "{{ ct_instance_api_token_secret }}"
    validate_certs: "{{ ct_instance_validate_certs }}"
    node: "{{ ct_instance_node }}"
    vmid: "{{ ct_instance_vmid }}"
    timeout: "{{ ct_instance_timeout }}"
    state: stopped

- name: Start CT after NVIDIA passthrough config change
  when:
    - ct_instance_enable_nvidia_passthrough | bool
    - ct_instance_restart_on_nvidia_passthrough_change | bool
    - ct_instance_nvidia_passthrough_result is defined
    - ct_instance_nvidia_passthrough_result is changed
    - ct_instance_state != 'absent'
  delegate_to: localhost
  community.general.proxmox:
    api_host: "{{ ct_instance_api_host }}"
    api_user: "{{ ct_instance_api_user }}"
    api_token_id: "{{ ct_instance_api_token_id_effective }}"
    api_token_secret: "{{ ct_instance_api_token_secret }}"
    validate_certs: "{{ ct_instance_validate_certs }}"
    node: "{{ ct_instance_node }}"
    vmid: "{{ ct_instance_vmid }}"
    timeout: "{{ ct_instance_timeout }}"
    state: started
