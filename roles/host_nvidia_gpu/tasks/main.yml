---
- name: Assert host OS family is Debian
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
    fail_msg: "host_nvidia_gpu currently supports Debian-based Proxmox hosts only"

- name: Assert Proxmox kernel is running
  ansible.builtin.assert:
    that:
      - ansible_kernel is search('pve')
    fail_msg: >-
      Proxmox kernel is required for this role. Current kernel: {{ ansible_kernel }}.
      Install and boot a pve kernel first.
  when: host_nvidia_gpu_require_pve_kernel

- name: Install NVIDIA prerequisites (DKMS/toolchain)
  ansible.builtin.apt:
    name: "{{ host_nvidia_gpu_prereq_packages }}"
    state: present
    update_cache: true

- name: Install exact matching Proxmox kernel headers
  ansible.builtin.apt:
    name: "{{ host_nvidia_gpu_header_packages[0] }}"
    state: present
  register: host_nvidia_headers_exact
  failed_when: false

- name: Assert exact kernel headers are installed
  ansible.builtin.assert:
    that:
      - host_nvidia_headers_exact is not failed
    fail_msg: >-
      Exact headers package {{ host_nvidia_gpu_header_packages[0] }} is required but was not installed.
      Run apt full-upgrade on the PVE host and reboot into the installed pve kernel, then retry.
  when: host_nvidia_gpu_require_exact_headers

- name: Ensure DKMS state is available for diagnostics
  ansible.builtin.command: dkms status
  register: host_nvidia_dkms_status
  changed_when: false
  failed_when: false

- name: Simulate NVIDIA package install plan
  ansible.builtin.command: "apt-get -s install {{ host_nvidia_gpu_packages | join(' ') }}"
  register: host_nvidia_apt_plan
  changed_when: false

- name: Assert install plan does not remove proxmox-ve meta package
  ansible.builtin.assert:
    that:
      - host_nvidia_apt_plan.stdout is not regex('(?s)The following packages will be REMOVED:.*\\bproxmox-ve\\b')
    fail_msg: >-
      Refusing to continue because apt simulation indicates `proxmox-ve` removal.
      Verify APT repository configuration and package pinning before installing NVIDIA packages.
      Typical fixes: keep Proxmox repositories enabled and avoid mixing Debian firmware packages
      that replace `pve-firmware`.
  when: host_nvidia_gpu_block_proxmox_removal

- name: Install NVIDIA driver stack packages
  ansible.builtin.apt:
    name: "{{ host_nvidia_gpu_packages }}"
    state: present
    update_cache: true

- name: Build DKMS modules for running kernel
  ansible.builtin.command: "dkms autoinstall -k {{ ansible_kernel }}"
  register: host_nvidia_dkms_autoinstall
  changed_when: "'Installing' in host_nvidia_dkms_autoinstall.stdout"
  failed_when: false

- name: Run depmod for running kernel
  ansible.builtin.command: "depmod -a {{ ansible_kernel }}"
  changed_when: false

- name: Discover compiled NVIDIA modules for running kernel
  ansible.builtin.find:
    paths: "/lib/modules/{{ ansible_kernel }}"
    recurse: true
    use_regex: true
    patterns:
      - '^nvidia.*\\.ko(\\.xz|\\.zst)?$'
  register: host_nvidia_module_files

- name: Assert NVIDIA kernel modules are present for running kernel
  ansible.builtin.assert:
    that:
      - host_nvidia_module_files.matched | int > 0
    fail_msg: >-
      No NVIDIA kernel module was found under /lib/modules/{{ ansible_kernel }}.
      Ensure DKMS built successfully for this kernel and reboot if a new kernel was installed.

- name: Detect module naming variant
  ansible.builtin.set_fact:
    host_nvidia_gpu_use_current_modules: >-
      {{ (host_nvidia_module_files.files | map(attribute='path') | select('search', 'nvidia-current') | list | length) > 0 }}

- name: Select module list to load
  ansible.builtin.set_fact:
    host_nvidia_gpu_modules_to_load: >-
      {{ host_nvidia_gpu_modules_current if host_nvidia_gpu_use_current_modules else host_nvidia_gpu_modules_standard }}

- name: Trigger device node creation
  ansible.builtin.command: nvidia-modprobe -u -c=0
  changed_when: false
  failed_when: false

- name: Load NVIDIA kernel modules
  ansible.builtin.command: "modprobe --ignore-install {{ item }}"
  loop: "{{ host_nvidia_gpu_modules_to_load }}"
  changed_when: false

- name: Verify NVIDIA device files exist
  ansible.builtin.find:
    paths: /dev
    patterns: "nvidia*"
    file_type: any
  register: host_nvidia_dev_nodes

- name: Assert NVIDIA device files are present
  ansible.builtin.assert:
    that:
      - host_nvidia_dev_nodes.matched | int > 0
    fail_msg: >-
      NVIDIA device files were not found under /dev. This usually means the driver module
      is not loaded correctly or package installation failed.
  when: host_nvidia_gpu_require_nvidia_devices

- name: Ensure nvidia-persistenced service state
  ansible.builtin.service:
    name: nvidia-persistenced
    enabled: true
    state: started
  when: host_nvidia_gpu_enable_persistenced

- name: Validate nvidia-smi availability
  ansible.builtin.command: nvidia-smi -L
  register: nvidia_smi_devices
  changed_when: false
