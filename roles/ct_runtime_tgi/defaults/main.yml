---
ct_runtime_tgi_user: infer
ct_runtime_tgi_group: infer
ct_runtime_tgi_workdir: /opt/inference
ct_runtime_tgi_env_file: /etc/default/tgi
ct_runtime_tgi_service_name: tgi.service
ct_runtime_tgi_launcher_cmd: /usr/local/bin/text-generation-launcher
ct_runtime_tgi_packages:
  - text-generation
ct_runtime_tgi_bind_host: "{{ ct_runtime_launcher_bind_host | default('0.0.0.0') }}"
ct_runtime_tgi_port: "{{ ct_runtime_launcher_port | default(8000) }}"
ct_runtime_tgi_model: "{{ ct_runtime_launcher_model | default('mistralai/Mistral-7B-Instruct-v0.3', true) }}"
ct_runtime_tgi_dtype: "{{ ct_runtime_launcher_dtype | default('auto') }}"
ct_runtime_tgi_max_input_length: "{{ ct_runtime_launcher_context_length | default(8192) }}"
ct_runtime_tgi_max_total_tokens: "{{ ct_runtime_launcher_context_length | default(8192) }}"
ct_runtime_tgi_max_concurrent_requests: "{{ ct_runtime_launcher_max_num_seqs | default(32) }}"
ct_runtime_tgi_extra_args: "{{ ct_runtime_launcher_extra_args | default('') }}"
