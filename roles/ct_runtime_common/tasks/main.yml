---
- name: Load OS/distribution specific variables
  ansible.builtin.import_tasks: variables.yml

- name: Install runtime common packages (Debian family)
  when: ansible_os_family == 'Debian'
  block:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: "{{ ct_runtime_common_apt_cache_valid_time }}"

    - name: Install runtime common packages with apt
      ansible.builtin.apt:
        name: "{{ ct_runtime_common_packages }}"
        state: present
  rescue:
    - name: Force refresh apt cache after package install failure
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true

    - name: Retry runtime common package installation with apt
      ansible.builtin.apt:
        name: "{{ ct_runtime_common_packages }}"
        state: present

- name: Install runtime common packages (non-Debian)
  ansible.builtin.package:
    name: "{{ ct_runtime_common_packages }}"
    state: present
  when: ansible_os_family != 'Debian'

- name: Build effective strict-mode flag for nvidia-smi installation
  ansible.builtin.set_fact:
    ct_runtime_common_install_nvidia_smi_effective: >-
      {{
        ct_runtime_common_install_nvidia_smi
        or
        ((ct_runtime_common_nvidia_power_limit_watts | string | length) > 0)
      }}
    ct_runtime_common_fail_on_nvidia_smi_install_effective: >-
      {{
        ct_runtime_common_fail_on_nvidia_smi_install
        or
        ((ct_runtime_common_nvidia_power_limit_watts | string | length) > 0)
      }}

- name: Assert nvidia-smi package candidates are defined when required
  ansible.builtin.assert:
    that:
      - ct_runtime_common_nvidia_smi_packages | length > 0
    fail_msg: >-
      ct_runtime_common_nvidia_smi_packages is empty but nvidia-smi is required.
      Set package candidates for your distribution.
  when: ct_runtime_common_install_nvidia_smi_effective

- name: Ensure optional nvidia-smi package is installed in CT
  ansible.builtin.package:
    name: "{{ ct_runtime_common_nvidia_smi_packages }}"
    state: present
  register: ct_runtime_common_nvidia_smi_install
  failed_when: false
  when:
    - ct_runtime_common_install_nvidia_smi_effective
    - ct_runtime_common_nvidia_smi_packages | length > 0

- name: Fail if nvidia-smi package install failed and strict mode is enabled
  ansible.builtin.assert:
    that:
      - ct_runtime_common_nvidia_smi_install is not failed
    fail_msg: >-
      Failed to install CT nvidia-smi packages: {{ ct_runtime_common_nvidia_smi_packages }}.
      Override ct_runtime_common_nvidia_smi_packages for your distro.
      Note: strict mode is always enabled when ct_runtime_common_nvidia_power_limit_watts is set.
  when:
    - ct_runtime_common_install_nvidia_smi_effective
    - ct_runtime_common_nvidia_smi_packages | length > 0
    - ct_runtime_common_fail_on_nvidia_smi_install_effective

- name: Warn when nvidia-smi package install failed but strict mode is disabled
  ansible.builtin.debug:
    msg: >-
      nvidia-smi package install failed for {{ ct_runtime_common_nvidia_smi_packages }}.
      Continuing because ct_runtime_common_fail_on_nvidia_smi_install_effective=false.
  when:
    - ct_runtime_common_install_nvidia_smi_effective
    - ct_runtime_common_nvidia_smi_packages | length > 0
    - ct_runtime_common_nvidia_smi_install is failed
    - not ct_runtime_common_fail_on_nvidia_smi_install_effective

- name: Assert nvidia-smi binary exists when power limit is configured
  ansible.builtin.stat:
    path: /usr/bin/nvidia-smi
  register: ct_runtime_common_nvidia_smi_binary
  when: (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0

- name: Fail when nvidia-smi binary is missing but power limit is configured
  ansible.builtin.assert:
    that:
      - ct_runtime_common_nvidia_smi_binary.stat.exists
    fail_msg: >-
      ct_runtime_common_nvidia_power_limit_watts is set but /usr/bin/nvidia-smi is missing in CT.
      Ensure nvidia-smi package installation succeeds before enabling CT power-limit service.
  when: (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0

- name: Deploy NVIDIA power-limit helper script in CT
  ansible.builtin.template:
    src: ct-apply-nvidia-power-limit.sh.j2
    dest: "{{ ct_runtime_common_nvidia_power_limit_script_path }}"
    owner: root
    group: root
    mode: "0755"
  register: ct_runtime_common_nvidia_power_limit_script
  when: (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0

- name: Deploy NVIDIA power-limit service unit in CT
  ansible.builtin.template:
    src: ct-nvidia-power-limit.service.j2
    dest: "/etc/systemd/system/{{ ct_runtime_common_nvidia_power_limit_service_name }}"
    owner: root
    group: root
    mode: "0644"
  register: ct_runtime_common_nvidia_power_limit_service
  when: (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0

- name: Reload systemd daemon for CT NVIDIA power-limit unit updates
  ansible.builtin.systemd_service:
    daemon_reload: true
  when:
    - (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0
    - ct_runtime_common_nvidia_power_limit_script is changed or ct_runtime_common_nvidia_power_limit_service is changed

- name: Ensure CT NVIDIA power-limit service state
  ansible.builtin.systemd_service:
    name: "{{ ct_runtime_common_nvidia_power_limit_service_name }}"
    enabled: true
  when: (ct_runtime_common_nvidia_power_limit_watts | string | length) > 0

- name: Ensure runtime group exists
  ansible.builtin.group:
    name: "{{ ct_runtime_common_group }}"
    state: present

- name: Ensure runtime user exists
  ansible.builtin.user:
    name: "{{ ct_runtime_common_user }}"
    group: "{{ ct_runtime_common_group }}"
    home: "{{ ct_runtime_common_home }}"
    create_home: true
    shell: /bin/bash
    state: present

- name: Create runtime directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ct_runtime_common_user }}"
    group: "{{ ct_runtime_common_group }}"
    mode: "0755"
  loop: "{{ ct_runtime_common_directories }}"

- name: Create runtime python virtual environment
  ansible.builtin.command: "python3 -m venv {{ ct_runtime_common_venv }}"
  args:
    creates: "{{ ct_runtime_common_venv }}/bin/activate"
